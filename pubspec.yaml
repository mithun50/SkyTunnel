name: skytunnel
description: "One-click game server hosting via ngrok"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  intl: ^0.20.2
  collection: ^1.19.1
  crypto: ^3.0.6
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/
