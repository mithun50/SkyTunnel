name: Build SkyTunnel

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.5'
  PROJECT_NAME: skytunnel

jobs:
  # ─── Analyze & Test ────────────────────────────────────────────────
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ─── Build Windows ────────────────────────────────────────────────
  build-windows:
    needs: analyze-and-test
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-windows
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

  # ─── Build macOS ──────────────────────────────────────────────────
  build-macos:
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-macos
          path: build/macos/Build/Products/Release/
          if-no-files-found: error

  # ─── Build Linux ──────────────────────────────────────────────────
  build-linux:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

  # ─── Release (on tag push) ────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package Windows
        run: |
          cd artifacts/${{ env.PROJECT_NAME }}-windows
          7z a ../../${{ env.PROJECT_NAME }}-windows.zip .

      - name: Package macOS
        run: |
          cd artifacts/${{ env.PROJECT_NAME }}-macos
          zip -r ../../${{ env.PROJECT_NAME }}-macos.zip .

      - name: Package Linux
        run: |
          cd artifacts/${{ env.PROJECT_NAME }}-linux
          tar -czf ../../${{ env.PROJECT_NAME }}-linux.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.PROJECT_NAME }}-windows.zip
            ${{ env.PROJECT_NAME }}-macos.zip
            ${{ env.PROJECT_NAME }}-linux.tar.gz
