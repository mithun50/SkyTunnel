<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CEC9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Cable/tunnel arc -->
  <path d="M 120 320 Q 120 160 256 160 Q 392 160 392 320"
        stroke="white" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Cable/tunnel arc inner -->
  <path d="M 150 310 Q 150 190 256 190 Q 362 190 362 310"
        stroke="white" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Lightning bolt / tunnel icon -->
  <path d="M 280 140 L 220 260 L 270 260 L 230 380 L 310 250 L 255 250 L 300 140 Z"
        fill="url(#bolt)" filter="url(#shadow)"/>

  <!-- Signal waves (right side) -->
  <path d="M 340 220 Q 380 256 340 292" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 365 200 Q 420 256 365 312" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 390 180 Q 460 256 390 332" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Connection dots -->
  <circle cx="120" cy="320" r="14" fill="white" opacity="0.8"/>
  <circle cx="392" cy="320" r="14" fill="white" opacity="0.8"/>
</svg>
